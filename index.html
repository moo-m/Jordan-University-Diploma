<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الاختبارات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <h1>اختر فصلاً للبدء</h1>
            <div id="chapters-list" class="chapters-grid">
                <!-- Chapters will be loaded here -->
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen">
            <header class="quiz-header">
                <button id="toggle-sidebar" class="icon-btn">☰</button>
                <h2 id="current-chapter-title">اسم الفصل</h2>
                <div class="progress-info">
                    سؤال <span id="current-q-num">1</span> من <span id="total-q-num">10</span>
                </div>
            </header>

            <div class="quiz-layout">
                <!-- Sidebar -->
                <aside id="sidebar" class="sidebar">
                    <div class="sidebar-header">
                        <h3>الأسئلة</h3>
                    </div>
                    <div id="question-nav" class="question-nav-grid">
                        <!-- Question numbers will be loaded here -->
                    </div>
                </aside>

                <!-- Main Quiz Content -->
                <main class="quiz-main">
                    <div id="question-container" class="question-card">
                        <p id="question-text" class="question-text"></p>
                        <div id="options-container" class="options-grid">
                            <!-- Options will be loaded here -->
                        </div>
                        <div id="feedback-container" class="feedback-area hidden">
                            <p id="correct-answer-text"></p>
                        </div>
                    </div>

                    <footer class="quiz-footer">
                        <button id="prev-btn" class="btn secondary">السابق</button>
                        <button id="next-btn" class="btn primary">التالي</button>
                    </footer>
                </main>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen">
            <div class="result-card">
                <h2>نتيجة الاختبار</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="label">الإجابات الصحيحة:</span>
                        <span id="total-correct" class="value correct">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">الإجابات الخاطئة:</span>
                        <span id="total-wrong" class="value wrong">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">النسبة المئوية:</span>
                        <span id="percentage" class="value">0%</span>
                    </div>
                </div>
                <div class="result-actions">
                    <button id="restart-btn" class="btn primary">إعادة الاختبار</button>
                    <button id="review-wrong-btn" class="btn secondary">مراجعة الأخطاء فقط</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
