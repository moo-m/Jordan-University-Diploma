<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الاختبارات</title>

<style>
:root {
    --primary-color: #3498db;
    --secondary-color: #2ecc71;
    --error-color: #e74c3c;
    --bg-color: #f4f7f6;
    --text-color: #2c3e50;
    --card-bg: #ffffff;
}

/* Dark Mode */
body.dark {
    --bg-color: #1e1e1e;
    --text-color: #ffffff;
    --card-bg: #2c2c2c;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI';
}

body {
    background: var(--bg-color);
    color: var(--text-color);
}

/* Header Intro */
.intro {
    text-align: center;
    margin-bottom: 30px;
}

.logos {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
}

.logos img {
    width: 70px;
    height: 70px;
    object-fit: contain;
}

.intro h1 {
    color: var(--primary-color);
    margin-bottom: 10px;
}

.intro p {
    font-size: 1.1rem;
}

/* باقي التصميم (كما هو بدون تغيير) */
.screen { display: none; }
.screen.active { display: block; }

.chapter-btn {
    padding: 15px;
    margin: 10px;
    border: 2px solid var(--primary-color);
    cursor: pointer;
}

.option-btn { display:block; margin:10px 0; padding:10px; cursor:pointer; }
.correct { background: green; color:white; }
.wrong { background:red; color:white; }

.hidden { display:none; }

.dark-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<button class="dark-toggle">🌙</button>

<div class="app-container">

<!-- Start Screen -->
<section id="start-screen" class="screen active">

    <!-- ✅ التعريف الجديد -->
    <div class="intro">

        <div class="logos">
            <!-- ضع الصور هنا -->
            <img src="ju-logo.png" alt="شعار الجامعة الأردنية">
            <img src="diploma-logo.png" alt="شعار الدبلوم">
        </div>

        <h1>مراجعة امتحان النظام التربوي في الأردن</h1>

        <p>
            الدبلوم العالي لإعداد المعلمين<br>
            الجامعة الأردنية
        </p>

    </div>

    <h2>اختر فصلاً للبدء</h2>
    <div id="chapters-list"></div>

</section>

<!-- Quiz -->
<section id="quiz-screen" class="screen">
    <h2 id="current-chapter-title"></h2>
    <p>سؤال <span id="current-q-num"></span> من <span id="total-q-num"></span></p>

    <p id="question-text"></p>
    <div id="options-container"></div>

    <button id="prev-btn">السابق</button>
    <button id="next-btn">التالي</button>
</section>

<!-- Result -->
<section id="result-screen" class="screen">
    <h2>النتيجة</h2>
    <p>صحيح: <span id="total-correct"></span></p>
    <p>خطأ: <span id="total-wrong"></span></p>
    <p>النسبة: <span id="percentage"></span></p>
</section>

</div>

<script>
// DARK MODE
const toggle = document.querySelector('.dark-toggle');
toggle.onclick = () => {
    document.body.classList.toggle('dark');
};

// DATA
let examBank = [];
let currentChapter = null;
let currentQuestions = [];
let currentIndex = 0;
let answers = [];

// LOAD JSON
fetch('data.json')
.then(res => res.json())
.then(data => {
    examBank = data.exam_bank;
    renderChapters();
});

function renderChapters(){
    const container = document.getElementById('chapters-list');
    container.innerHTML='';
    examBank.forEach((c,i)=>{
        const btn=document.createElement('button');
        btn.textContent=c.chapter;
        btn.className='chapter-btn';
        btn.onclick=()=>startQuiz(i);
        container.appendChild(btn);
    });
}

function startQuiz(i){
    currentChapter = examBank[i];
    currentQuestions = currentChapter.questions;
    currentIndex=0;
    answers = new Array(currentQuestions.length).fill(null);

    showScreen('quiz-screen');
    renderQuestion();
}

function renderQuestion(){
    const q = currentQuestions[currentIndex];
    document.getElementById('question-text').textContent=q.text;
    document.getElementById('current-q-num').textContent=currentIndex+1;
    document.getElementById('total-q-num').textContent=currentQuestions.length;

    const optionsDiv=document.getElementById('options-container');
    optionsDiv.innerHTML='';

    Object.entries(q.options).forEach(([k,v])=>{
        const btn=document.createElement('button');
        btn.textContent=`${k}: ${v}`;
        btn.className='option-btn';
        btn.onclick=()=>answer(k);
        optionsDiv.appendChild(btn);
    });
}

function answer(key){
    const q = currentQuestions[currentIndex];
    const correct = key===q.correct_answer;

    answers[currentIndex]={selected:key,correct};

    if(currentIndex===currentQuestions.length-1){
        showResult();
    }else{
        currentIndex++;
        renderQuestion();
    }
}

function showResult(){
    const correct=answers.filter(a=>a.correct).length;
    const wrong=answers.length-correct;

    document.getElementById('total-correct').textContent=correct;
    document.getElementById('total-wrong').textContent=wrong;
    document.getElementById('percentage').textContent=Math.round(correct/answers.length*100)+'%';

    // حفظ النتيجة
    localStorage.setItem('last_score', JSON.stringify({correct,wrong}));

    showScreen('result-screen');
}

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
