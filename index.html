<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الاختبارات</title>

<style>

/* ========== ROOT ========== */
:root {
    --primary: #2563eb;
    --secondary: #16a34a;
    --danger: #dc2626;
    --bg: #f8fafc;
    --text: #0f172a;
    --card: #ffffff;
    --border: #e2e8f0;
}

body.dark {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --border: #334155;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: system-ui, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
}

.app-container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.hero {
    text-align: center;
    margin-bottom: 30px;
}

.logos {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.logos img {
    width: 70px;
}

.main-title {
    font-size: 1.6rem;
    margin-top: 10px;
    color: var(--primary);
}

.subtitle {
    opacity: 0.7;
}


.card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
}


.chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap: 15px;
}

.chapter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
    font-weight: bold;
}

.chapter-btn:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
}


.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}


.question-card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
}

.question-text {
    font-size: 1.2rem;
    margin-bottom: 20px;
}


.options-grid {
    display: grid;
    gap: 10px;
}

.option-btn {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: 0.2s;
}

.option-btn:hover {
    border-color: var(--primary);
    background: rgba(37,99,235,0.05);
}

.option-btn.correct {
    background: var(--secondary);
    color: white;
}

.option-btn.wrong {
    background: var(--danger);
    color: white;
}

.quiz-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.primary {
    background: var(--primary);
    color: white;
}

.secondary {
    background: #64748b;
    color: white;
}


.quiz-layout {
    display: flex;
    gap: 15px;
}

.sidebar {
    width: 220px;
}

.question-nav-grid {
    display: grid;
    grid-template-columns: repeat(5,1fr);
    gap: 8px;
}

.nav-num {
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    background: #e2e8f0;
    cursor: pointer;
}

.nav-num.correct { background: var(--secondary); color:white; }
.nav-num.wrong { background: var(--danger); color:white; }
.nav-num.current { border:2px solid var(--primary); }

.result-card {
    text-align: center;
}


@media (max-width: 900px) {
    .quiz-layout { flex-direction: column; }
    .sidebar { width: 100%; order: 2; }
    .question-nav-grid { grid-template-columns: repeat(10,1fr); }
}

@media (max-width: 500px) {
    .main-title { font-size: 1.2rem; }
    .question-text { font-size: 1rem; }
    button { width: 100%; }
    .quiz-footer { flex-direction: column; gap: 10px; }
}


.dark-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<button class="dark-toggle">🌙</button>

<div class="app-container">

<!-- START -->
<section id="start-screen" class="screen active">

<div class="hero">
    <div class="logos">
        <img src="ju-logo.png">
        <img src="diploma-logo.png">
    </div>

    <h1 class="main-title">مراجعة امتحان النظام التربوي في الأردن</h1>
    <p class="subtitle">الدبلوم العالي لإعداد المعلمين – الجامعة الأردنية</p>
</div>

<h2>اختر فصلاً للبدء</h2>
<div id="chapters-list" class="chapters-grid"></div>

</section>

<!-- QUIZ -->
<section id="quiz-screen" class="screen">
    <h2 id="current-chapter-title"></h2>
    <p>سؤال <span id="current-q-num"></span> من <span id="total-q-num"></span></p>

    <div class="question-card">
        <p id="question-text" class="question-text"></p>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div class="quiz-footer">
        <button id="prev-btn" class="secondary">السابق</button>
        <button id="next-btn" class="primary">التالي</button>
    </div>
</section>

<!-- RESULT -->
<section id="result-screen" class="screen">
    <div class="card result-card">
        <h2>النتيجة</h2>
        <p>✔ صحيح: <span id="total-correct"></span></p>
        <p>❌ خطأ: <span id="total-wrong"></span></p>
        <p>📊 النسبة: <span id="percentage"></span></p>
    </div>
</section>

</div>

<script>

// DARK MODE
document.querySelector('.dark-toggle').onclick = () =>
    document.body.classList.toggle('dark');

// DATA
let examBank = [];
let currentChapter, currentQuestions, currentIndex, answers;

// LOAD JSON
fetch('data.json')
.then(res => res.json())
.then(data => {
    examBank = data.exam_bank;
    renderChapters();
});

// CHAPTERS
function renderChapters(){
    const c = document.getElementById('chapters-list');
    c.innerHTML='';
    examBank.forEach((ch,i)=>{
        const b=document.createElement('button');
        b.textContent=ch.chapter;
        b.className='chapter-btn';
        b.onclick=()=>startQuiz(i);
        c.appendChild(b);
    });
}

// START
function startQuiz(i){
    currentChapter=examBank[i];
    currentQuestions=currentChapter.questions;
    currentIndex=0;
    answers=new Array(currentQuestions.length).fill(null);

    show('quiz-screen');
    renderQuestion();
}

// QUESTION
function renderQuestion(){
    const q=currentQuestions[currentIndex];

    document.getElementById('question-text').textContent=q.text;
    document.getElementById('current-q-num').textContent=currentIndex+1;
    document.getElementById('total-q-num').textContent=currentQuestions.length;

    const box=document.getElementById('options-container');
    box.innerHTML='';

    Object.entries(q.options).forEach(([k,v])=>{
        const btn=document.createElement('button');
        btn.textContent=k+' : '+v;
        btn.className='option-btn';
        btn.onclick=()=>answer(k);
        box.appendChild(btn);
    });
}

// ANSWER
function answer(k){
    const q=currentQuestions[currentIndex];
    answers[currentIndex]={correct:k===q.correct_answer};

    if(currentIndex===currentQuestions.length-1){
        result();
    } else {
        currentIndex++;
        renderQuestion();
    }
}

// RESULT
function result(){
    const correct=answers.filter(a=>a.correct).length;
    const wrong=answers.length-correct;

    document.getElementById('total-correct').textContent=correct;
    document.getElementById('total-wrong').textContent=wrong;
    document.getElementById('percentage').textContent=Math.round(correct/answers.length100)+'%';

    localStorage.setItem('score', JSON.stringify({correct,wrong}));

    show('result-screen');
}

// NAV
document.getElementById('next-btn').onclick=()=>{
    if(currentIndex<currentQuestions.length-1){
        currentIndex++;
        renderQuestion();
    } else result();
};

document.getElementById('prev-btn').onclick=()=>{
    if(currentIndex>0){
        currentIndex--;
        renderQuestion();
    }
};

function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
